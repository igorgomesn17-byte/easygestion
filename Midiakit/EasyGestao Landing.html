  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    // window.__resources + the click interceptor into <head>. slice() rather

      }

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only

            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +

            'if (h.charAt(0) !== "#") {' +

              'e.preventDefault();' +

              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';

      // would push the parser into quirks mode. DOMParser always emits a <head>

      // attributes through, so match the full opening tag.

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting

      // before Babel before text/babel).

        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

          try {

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;

      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

0;font-size:14.5px;color:#6b8079;\">14 dias grátis para testar com calma.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PROBLEMAS -->\n  <section data-screen-label=\"Problemas\" style=\"max-width:1160px;margin:0 auto;padding:clamp(64px,9vw,104px) clamp(20px,5vw,48px);\">\n    <div class=\"eg-reveal\" style=\"text-align:center;max-width:620px;margin:0 auto clamp(40px,6vw,60px);\">\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,4.6vw,42px);color:#143f37;margin:0 0 14px;\">Soa familiar?<\u002Fh2>\n      <p style=\"font-size:17px;color:#52685f;margin:0;text-wrap:pretty;\">Você não está sozinha. A maioria das lojas vive isso todo dia — e dá pra resolver.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:22px;\">\n      <sc-for list=\"{{ problems }}\" as=\"p\" hint-placeholder-count=\"4\">\n        <div class=\"eg-reveal\" style=\"background:#fff;border-radius:18px;padding:30px 26px;box-shadow:0 10px 30px rgba(20,63,55,.06);border:1px solid rgba(26,111,94,.07);transition:transform .25s,box-shadow .25s;\" style-hover=\"transform:translateY(-6px);box-shadow:0 18px 40px rgba(20,63,55,.12);\">\n          <div aria-hidden=\"true\" style=\"font-family:'Playfair Display',serif;font-size:30px;color:#c39a36;margin-bottom:14px;\">{{ p.num }}<\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:21px;color:#1a6f5e;margin:0 0 10px;line-height:1.25;\">{{ p.title }}<\u002Fh3>\n          <p style=\"font-size:15.5px;color:#52685f;margin:0;text-wrap:pretty;\">{{ p.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COMO FUNCIONA -->\n  <section data-screen-label=\"Como funciona\" style=\"background:#1a6f5e;color:#f9fbfa;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:clamp(64px,9vw,104px) clamp(20px,5vw,48px);\">\n      <div class=\"eg-reveal\" style=\"text-al 111,94,.3);transition:transform .2s,box-shadow .2s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 16px 34px rgba(26,111,94,.4);\">Começar meus 14 dias grátis<\u002Fa>\n      <p style=\"text-align:center;margin:16px 0 0;font-size:14px;color:#6b8079;\">Cancele quando quiser, sem multa.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TESTIMONIALS -->\n  <section data-screen-label=\"Depoimentos\" style=\"background:#f1f6f3;\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:clamp(64px,9vw,104px) clamp(20px,5vw,48px);\">\n      <div class=\"eg-reveal\" style=\"text-align:center;max-width:600px;margin:0 auto clamp(40px,6vw,56px);\">\n        <h2 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,4.6vw,42px);color:#143f37;margin:0;\">Quem usa, conta<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:26px;\">\n        <sc-for list=\"{{ testimonials }}\" as=\"t\" hint-placeholder-count=\"2\">\n          <figure class=\"eg-reveal\" style=\"margin:0;background:#fff;border-radius:20px;padding:34px 30px;box-shadow:0 12px 34px rgba(20,63,55,.07);border:1px solid rgba(26,111,94,.06);display:flex;flex-direction:column;\">\n            <span aria-hidden=\"true\" style=\"font-family:'Playfair Display',serif;font-size:54px;line-height:.6;color:#c39a36;margin-bottom:8px;\">“<\u002Fspan>\n            <blockquote style=\"margin:0 0 22px;font-size:17px;color:#34514a;font-style:italic;line-height:1.55;text-wrap:pretty;\">{{ t.quote }}<\u002Fblockquote>\n            <figcaption style=\"margin-top:auto;display:flex;align-items:center;gap:13px;\">\n              <span aria-hidden=\"true\" style=\"flex:none;width:46px;height:46px;border-radius:50%;background:#1a6f5e;color:#f9fbfa;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:600;font-size:19px;\">{{ t.initial }}<\u002Fspan>\n              <span>\n                <strong style=\"display:block;font-size:15.5px;color:#143f37;font-weight:600;\">{{ t.name }}<\u002Fstrong>\n                <span style=\"font-size:14px;color:#6b8079;\">{{ t.role }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Ffigcaption>\n          <\u002Ffigure>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section data-screen-label=\"FAQ\" style=\"max-width:780px;margin:0 auto;padding:clamp(64px,9vw,104px) clamp(20px,5vw,48px);\">\n    <div class=\"eg-reveal\" style=\"text-align:center;margin-bottom:clamp(36px,5vw,52px);\">\n      <h2 style=\"font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(28px,4.6vw,42px);color:#143f37;margin:0;\">Perguntas que toda lojista faz<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"q\" hint-placeholder-count=\"5\">\n        <div class=\"eg-reveal\" style=\"background:#fff;border-radius:16px;border:1px solid rgba(26,111,94,.1);box-shadow:0 6px 20px rgba(20,63,55,.05);overflow:hidden;\">\n          <button type=\"button\" aria-expanded=\"{{ q.isOpen }}\" onclick=\"{{ q.toggle }}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;font-family:'Poppins',sans-serif;font-weight:500;font-size:17px;color:#143f37;\">\n            <span style=\"text-wrap:pretty;\">{{ q.question }}<\u002Fspan>\n            <span aria-hidden=\"true\" style=\"flex:none;width:28px;height:28px;border-radius:50%;background:rgba(26,111,94,.1);color:#1a6f5e;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;transition:transform .3s;transform:{{ q.iconRotate }};\">+<\u002Fspan>\n          <\u002Fbutton>\n          <div style=\"max-height:{{ q.maxHeight }};overflow:hidden;transition:max-height .35s ease;\">\n            <p style=\"margin:0;padding:0 24px 24px;font-size:15.5px;color:#52685f;line-height:1.6;text-wrap:pretty;\">{{ q.answer }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer data-screen-label=\"Footer\" style=\"background:#143f37;color:rgba(249,251,250,.78);\">\n    <div style=\"max-width:1100px;margin:0 auto;padding:clamp(44px,6vw,64px) clamp(20px,5vw,48px) 36px;\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:28px;align-items:center;justify-content:space-between;\">\n        <a href=\"#topo\" aria-label=\"EasyGestão início\" style=\"display:flex;align-items:center;\">\n          <img src=\"defa426d-d51b-4532-aec7-5d2e29b00473\" alt=\"EasyGestão\" style=\"height:96px;width:auto;display:block;\">\n        <\u002Fa>\n        <nav style=\"display:flex;flex-wrap:wrap;gap:22px;font-size:15px;\">\n          <a href=\"termos.html\" style=\"transition:color .2s;\" style-hover=\"color:#e7c878;\">Termos de uso<\u002Fa>\n          <a href=\"privacidade.html\" style=\"transition:color .2s;\" style-hover=\"color:#e7c878;\">Privacidade<\u002Fa>\n          <a href=\"contato.html\" style=\"transition:color .2s;\" style-hover=\"color:#e7c878;\">Contato<\u002Fa>\n        <\u002Fnav>\n      <\u002Fdiv>\n      <p style=\"max-width:420px;margin:24px 0 0;font-size:14.5px;color:rgba(249,251,250,.62);text-wrap:pretty;\">Gestão simples, feita para o lojista do interior da Bahia. Sem palavra difícil, sem enrolação.<\u002Fp>\n      <div style=\"margin-top:34px;padding-top:22px;border-top:1px solid rgba(249,251,250,.14);font-size:13.5px;color:rgba(249,251,250,.55);\">© 2026 EasyGestão. Todos os direitos reservados.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { open: null };\n\n  toggle(i) {\n    this.setState(s => ({ open: s.open === i ? null : i }));\n  }\n\n  renderVals() {\n    const problems = [\n      { num: '01', title: 'Vendeu muito, sobrou pouco?', body: 'No fim do mês o caixa não bate com a sensação de loja cheia. Faturamento não é lucro — e a gente te mostra a diferença, sem complicação.' },\n      { num: '02', title: 'Estoque na cabeça e no caderno?', body: 'Você sabe o que vende, mas não o que sobra. Veja seu estoque organizado de verdade, sem planilha embolada.' },\n      { num: '03', title: 'Medo de mexer em tecnologia?', body: 'Se você usa WhatsApp, você usa o EasyGestão. Telas simples e claras, sem palavra difícil pra te assustar.' },\n      { num: '04', title: 'Informação espalhada por tudo?', body: 'Caderno, papelzinho, cabeça. Reúna tudo num lugar só e durma tranquila sabendo onde está cada número.' }\n    ];\n\n    const steps = [\n      { num: '1', title: 'Cadastre', body: 'Crie sua conta em minutos. Sem burocracia e sem instalar nada no computador.' },\n      { num: '2', title: 'Configure', body: 'Adicione seus produtos e preços. A gente te guia passo a passo, com calma.' },\n      { num: '3', title: 'Venda', body: 'Registre suas vendas e veja seu lucro aparecer na tela, claro como água.' }\n    ];\n\n    const features = [\n      'Controle de estoque completo e fácil',\n      'Relatório de lucro real — não só faturamento',\n      'Cadastro ilimitado de produtos',\n      'Vendas e fluxo de caixa num só lugar',\n      'Acesso pelo celular e pelo computador',\n      'Suporte de gente de verdade, em português'\n    ];\n\n    const testimonials = [\n      { quote: 'Eu achava que tava lucrando porque a loja vivia cheia. Quando vi os números, entendi onde o dinheiro escapava. Hoje eu decido com a cabeça, não no susto.', name: 'Dona Marlene', role: 'Loja de moda · Vitória da Conquista', initial: 'M' },\n      { quote: 'Tinha pavor de programa de computador. Mas é tão simples que minha filha de 12 anos configurou comigo numa tarde. Agora meu estoque tá todo no lugar.', name: 'Cleide Santos', role: 'Calçados · Feira de Santana', initial: 'C' }\n    ];\n\n    const rawFaqs = [\n      { question: 'E se eu não entender como usar?', answer: 'A gente fez o EasyGestão pensando em quem nunca mexeu com sistema. As telas são simples e, se travar, tem gente de verdade pra te ajudar pelo WhatsApp, em português claro.' },\n      { question: 'Meus dados estão seguros?', answer: 'Sim. Suas informações ficam guardadas com criptografia e backup automático. Ninguém além de você tem acesso ao que é seu.' },\n      { question: 'Posso cancelar quando quiser?', answer: 'Pode, a qualquer momento, sem multa e sem ligação chata pra te convencer a ficar. Você manda no seu negócio.' },\n      { question: 'Funciona com NFC-e?', answer: 'Sim, o EasyGestão emite NFC-e e te ajuda a manter tudo certinho com a nota fiscal, sem dor de cabeça.' },\n      { question: 'Dá pra integrar com meu banco?', answer: 'Dá. Você conecta sua conta e acompanha entradas e saídas no mesmo lugar, sem precisar digitar tudo de novo.' }\n    ];\n    const faqs = rawFaqs.map((f, i) => {\n      const isOpen = this.state.open === i;\n      return {\n        question: f.question,\n        answer: f.answer,\n        isOpen: isOpen,\n        toggle: () => this.toggle(i),\n        maxHeight: isOpen ? '240px' : '0px',\n        iconRotate: isOpen ? 'rotate(45deg)' : 'rotate(0deg)'\n      };\n    });\n\n    return { problems, steps, features, testimonials, faqs };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"landing.dc"}
