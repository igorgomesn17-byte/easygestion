<***REMOVED***DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Admin EasyGestão</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1B5E3F 0%, #0d3a24 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 400px;
      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 28px;
      color: #1B5E3F;
      margin-bottom: 10px;
    }

    .logo p {
      font-size: 14px;
      color: #999;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #1B5E3F;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #1B5E3F;
      box-shadow: 0 0 0 3px rgba(27, 94, 63, 0.1);
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 40px;
    }

    .toggle-senha {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #aaa;
      padding: 6px;
      margin: 0;
      transition: color 0.2s;
      z-index: 10;
    }

    .toggle-senha:hover {
      color: #1B5E3F;
    }

    button:not(.toggle-senha) {
      width: 100%;
      padding: 12px;
      background: #1B5E3F;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
    }

    button:not(.toggle-senha):hover {
      background: #0d3a24;
    }

    .error {
      color: #d9534f;
      font-size: 12px;
      margin-bottom: 15px;
      padding: 10px;
      background: #f8d7da;
      border-radius: 4px;
      display: none;
    }

    .error.show {
      display: block;
    }

    .info {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🔐 EasyGestão</h1>
      <p>Painel Administrativo</p>
    </div>

    <div class="error" id="erro"></div>

    <div class="form-group">
      <label>Senha de Admin</label>
      <div class="password-wrapper">
        <input type="password" id="senha" placeholder="Digite a senha" autofocus>
        <button type="button" class="toggle-senha" id="toggleSenha">👁️</button>
      </div>
    </div>

    <button id="btn-login" onclick="login()">Acessar</button>

    <div class="info">Sistema seguro. Apenas para administradores.</div>
  </div>

  <script>
    const senhaInput = document.getElementById('senha');
    const botao = document.getElementById('btn-login');
    const erroDiv = document.getElementById('erro');

    // Toggle de visibilidade da senha
    document.getElementById('toggleSenha').addEventListener('click', (e) => {
      e.preventDefault();
      senhaInput.type = senhaInput.type === 'password' ? 'text' : 'password';
    });

    async function login() {
      const senha = senhaInput.value;

      if (***REMOVED***senha) {
        erroDiv.textContent = 'Digite a senha***REMOVED***';
        erroDiv.classList.add('show');
        return;
      }

      botao.disabled = true;
      botao.textContent = 'Autenticando...';
      erroDiv.classList.remove('show');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ senha })
        });

        const data = await res.json();

        if (***REMOVED***res.ok) {
          erroDiv.textContent = data.erro || 'Erro ao autenticar.';
          erroDiv.classList.add('show');
          botao.disabled = false;
          botao.textContent = 'Acessar';
          return;
        }

        // ✅ Sucesso: redireciona pro admin dashboard
        window.location.href = '/admin-dashboard.html';
      } catch (err) {
        erroDiv.textContent = 'Erro de conexão. Tente novamente.';
        erroDiv.classList.add('show');
        botao.disabled = false;
        botao.textContent = 'Acessar';
      }
    }

    // Enter para submeter
    senhaInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });

    // Limpar erro ao digitar
    senhaInput.addEventListener('input', () => {
      erroDiv.classList.remove('show');
    });
  </script>
</body>
</html>
