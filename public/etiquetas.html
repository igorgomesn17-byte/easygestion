<DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etiqueta de produto • EasyGestão</title>
  <link rel="stylesheet" href="css/ds.css">
  <style>
    .container-etiquetas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px; max-width: 220mm; margin: 0 auto; }
    .etiqueta {
      width: 100mm; height: 50mm;
      background: #fff; border: 1px solid #ddd; border-radius: 4px;
      padding: 6mm; display: flex; flex-direction: column; justify-content: space-between;
      font-family: 'Courier New', monospace; font-size: 12px; box-sizing: border-box;
    }
    .etiqueta .loja { font-size: 9px; color: #666; text-align: center; margin-bottom: 4px; font-weight: 600; }
    .etiqueta .nome { font-size: 11px; font-weight: 700; text-align: center; margin-bottom: 6px; line-height: 1.2; }
    .etiqueta .barcode { text-align: center; margin: 6px 0; }
    .etiqueta .barcode img { height: 22mm; max-width: 90mm; }
    .etiqueta .preco { font-size: 16px; font-weight: 700; text-align: center; color: #000; }

    .controles { background: #f9fbfa; padding: 20px; border-bottom: 1px solid #e0e8e5; position: sticky; top: 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .controles input { padding: 8px 12px; border: 1px solid #d0dcd7; border-radius: 6px; font-size: 14px; }
    .controles label { display: flex; align-items: center; gap: 6px; font-weight: 500; }

    @media print {
      @page { size: 210mm 297mm; margin: 0; }
      .controles, .nao-imprime { display: none important; }
      body { background: #fff; }
      .container-etiquetas { padding: 0; gap: 0; grid-template-columns: repeat(2, 105mm); }
      .etiqueta { border: none; border-radius: 0; margin: 0; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="controles nao-imprime">
    <div>
      <label>Quantidade de cópias:</label>
      <input type="number" id="quantidade" value="1" min="1" max="100" style="width: 60px;">
    </div>
    <button class="btn btn-bloco btn-verde" onclick="window.print()">🖨️ Imprimir</button>
    <a class="btn btn-bloco btn-fantasma" href="produtos.html">← Voltar</a>
    <div class="texto-cinza" style="font-size: 0.85rem; margin-left: auto;">Elgin L42PRO (100mm × 50mm, 2 colunas)</div>
  </div>

  <div class="container-etiquetas" id="etiquetas"></div>

  <script src="js/comum.js"></script>
  <script>
    const produtoId = new URLSearchParams(location.search).get('id');
    if (produtoId) { alert('Produto não especificado'); location.href = 'produtos.html'; }

    async function carregar() {
      try {
        const [loja, produto] = await Promise.all([
          api('/config'),
          api('/produtos/' + produtoId)
        ]);

        // montar etiquetas repetidas conforme quantidade
        const qde = parseInt(document.getElementById('quantidade').value) || 1;
        let html = '';
        for (let i = 0; i < qde; i++) {
          html += `
            <div class="etiqueta">
              <div class="loja">${esc(loja.loja_nome || 'EasyGestão')}</div>
              <div class="nome">${esc(produto.nome)}</div>
              <div class="barcode"><img src="/api/codigo-barras/${esc(produto.codigo_barras)}.png" alt="código de barras"></div>
              <div class="preco">${moeda(produto.preco_venda)}</div>
            </div>`;
        }
        document.getElementById('etiquetas').innerHTML = html;
      } catch(e) {
        alert('Erro ao carregar produto: ' + e.message);
        location.href = 'produtos.html';
      }
    }

    document.getElementById('quantidade').addEventListener('change', carregar);
    carregar();
  </script>
</body>
</html>
