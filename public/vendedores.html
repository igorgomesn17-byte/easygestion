<DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipe • DS Store</title>
  <link rel="stylesheet" href="css/ds.css">
</head>
<body>
  <div class="conteudo">
    <div class="flex-entre">
      <div><h1>Equipe de vendas</h1><p class="subtitulo">Vendedores e comissões</p></div>
      <button class="btn" onclick="abrir()">+ Novo vendedor</button>
    </div>
    <div id="lista"></div>
  </div>

  <div class="modal-fundo" id="modal">
    <div class="modal">
      <button class="modal-fechar" onclick="fechar()">&times;</button>
      <h2 id="titulo">Novo vendedor</h2>
      <input type="hidden" id="vid">
      <div class="campo"><label>Nome *</label><input type="text" id="nome"></div>
      <div class="linha">
        <div class="campo"><label>WhatsApp</label><input type="text" id="tel"></div>
        <div class="campo"><label>Comissão (%)</label><input type="number" id="com" step="0.1" placeholder="5"></div>
      </div>
      <button class="btn btn-bloco" onclick="salvar()">Salvar</button>
      <button class="btn btn-bloco btn-vermelho mt" id="btnRemover" style="display:none;" onclick="remover()">Remover vendedor</button>
    </div>
  </div>

  <script src="js/comum.js"></script>
  <script>
    montarLayout('vendedores');

    async function carregar() {
      const lista = await api('/vendedores');
      const div = document.getElementById('lista');
      if (lista.length === 0) { div.innerHTML = '<div class="vazio">Nenhum vendedor cadastrado. Cadastre você e a Daisy para acompanhar vendas por pessoa.</div>'; return; }
      div.innerHTML = lista.map(v => `
        <div class="card">
          <div class="flex-entre">
            <div>
              <strong style="font-size:1.05rem;">${v.nome}</strong>
              <span class="badge badge-dourado">${v.comissao_pct}% comissão</span>
              <div class="texto-cinza" style="font-size:0.85rem;">${v.telefone||'sem telefone'}</div>
            </div>
            <button class="btn btn-fino btn-escuro" onclick='editar(${JSON.stringify(v).replace(/'/g,"&#39;")})'>Editar</button>
          </div>
          <div class="cards-grid mt" style="grid-template-columns:repeat(3,1fr);">
            <div class="card-metrica" style="box-shadow:none; background:var(--creme); padding:10px;">
              <div class="valor" style="font-size:1.2rem;">${v.mes.vendas}</div><div class="rotulo">vendas no mês</div></div>
            <div class="card-metrica" style="box-shadow:none; background:var(--creme); padding:10px;">
              <div class="valor dinheiro" style="font-size:1.2rem;">${moeda(v.mes.total)}</div><div class="rotulo">vendido</div></div>
            <div class="card-metrica" style="box-shadow:none; background:var(--creme); padding:10px;">
              <div class="valor dinheiro" style="font-size:1.2rem; color:var(--dourado-escuro);">${moeda(v.mes.comissao)}</div><div class="rotulo">comissão</div></div>
          </div>
        </div>`).join('');
    }

    function abrir() {
      document.getElementById('titulo').textContent = 'Novo vendedor';
      ['nome','tel','com'].forEach(i=>document.getElementById(i).value='');
      document.getElementById('vid').value = '';
      document.getElementById('btnRemover').style.display = 'none';
      document.getElementById('modal').classList.add('aberto');
    }
    function fechar(){ document.getElementById('modal').classList.remove('aberto'); }
    function editar(v) {
      document.getElementById('titulo').textContent = v.nome;
      document.getElementById('vid').value = v.id;
      document.getElementById('nome').value = v.nome;
      document.getElementById('tel').value = v.telefone||'';
      document.getElementById('com').value = v.comissao_pct;
      document.getElementById('btnRemover').style.display = 'block';
      document.getElementById('modal').classList.add('aberto');
    }

    async function salvar() {
      const nome = document.getElementById('nome').value.trim();
      if (nome){ toast('Informe o nome','erro'); return; }
      const id = document.getElementById('vid').value;
      const body = { nome, telefone:document.getElementById('tel').value, comissao_pct:document.getElementById('com').value };
      if (id) await api('/vendedores/'+id, { method:'PUT', body });
      else await api('/vendedores', { method:'POST', body });
      toast('Vendedor salvo','sucesso'); fechar(); carregar();
    }
    async function remover() {
      const id = document.getElementById('vid').value;
      if (confirm('Remover este vendedor? As vendas dele continuam no histórico.')) return;
      await api('/vendedores/'+id, { method:'DELETE' });
      toast('Vendedor removido','sucesso'); fechar(); carregar();
    }

    document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') fechar(); });
    carregar();
  </script>
</body>
</html>
