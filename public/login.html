<***REMOVED***DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Entrar • EasyGestão</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{ --marrom:#1a6f5e; --marrom-escuro:#0f4a3e; --dourado:#d4a017; --dourado-claro:#e8c98f;
      --creme:#f9fbfa; --tinta:#2d3436; --linha:#e0e8e5;
      /* cor da marca (o JS sobrescreve com a cor da loja). Default = verde EasyGestão. */
      --marca:#1a6f5e; --marca-escura:#0f4a3e; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(160deg,var(--marca) 0%,var(--marca-escura) 100%);padding:20px;color:var(--tinta)}
    .card{background:#fff;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.3);width:100%;max-width:380px;padding:38px 30px;text-align:center}
    .logo{height:auto;max-width:280px;max-height:80px;margin:0 auto 12px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.12));object-fit:contain}
    .marca{font-family:'Inter',sans-serif;font-weight:700;letter-spacing:1px;font-size:1.4rem;color:var(--marrom-escuro);display:none}
    .sub{color:#5b6470;font-size:.85rem;letter-spacing:2px;margin:6px 0 26px;text-transform:uppercase}
    label{display:block;text-align:left;font-size:.82rem;font-weight:500;color:#5b6470;margin:14px 0 5px}
    input{width:100%;min-height:50px;padding:12px 14px;border:1px solid var(--linha);border-radius:11px;font-size:16px;font-family:inherit}
    input:focus{outline:none;border-color:var(--marca);box-shadow:0 0 0 3px rgba(26,111,94,.15)}
    button{width:100%;min-height:52px;margin-top:22px;border:none;border-radius:12px;background:var(--marca);color:#fff;
      font-family:inherit;font-weight:600;font-size:1rem;cursor:pointer;transition:background .2s}
    button:hover{background:var(--marca-escura)}
    button:disabled{opacity:.6;cursor:wait}
    .erro{color:#C0392B;font-size:.85rem;margin-top:14px;min-height:18px}
    .links{display:flex;justify-content:center;gap:16px;margin-top:18px;flex-wrap:wrap}
    .voltar{display:inline-block;font-size:.82rem;color:#3a9580;text-decoration:none}
    .voltar:hover{color:var(--marca)}
    .esqueci{display:inline-block;font-size:.82rem;color:#3a9580;text-decoration:none}
    .esqueci:hover{color:var(--marca)}
    .termos-group{display:flex;align-items:flex-start;gap:8px;margin:18px 0;font-size:.78rem;color:#5b6470}
    .termos-group input[type="checkbox"]{width:18px;height:18px;margin-top:2px;cursor:pointer;flex-shrink:0}
    .termos-group label{margin:0;font-weight:400;display:inline;cursor:pointer}
    .termos-group a{color:var(--marca);text-decoration:none;font-weight:500}
    .termos-group a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <form class="card" id="form" onsubmit="entrar(event)">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 230" style="max-width:240px;height:auto;margin:0 auto 15px;display:block">
      <g transform="translate(24 43) scale(1.2000)">
        <g transform="rotate(-24 24 62)"><path d="M11 56 a7 7 0 0 1 7 -7 H34 a6 6 0 0 1 6 6 V71 a6 6 0 0 1 -6 6 H18 a7 7 0 0 1 -7 -7 Z M21 55.6 a3.4 3.4 0 1 0 0 6.8 a3.4 3.4 0 1 0 0 -6.8 Z" fill="#c39a36" fill-rule="evenodd"></path></g>
        <path d="M45 46 V36 a15 15 0 0 1 30 0 V46" fill="none" stroke="#1c4a35" stroke-width="7.5" stroke-linecap="round"></path>
        <path d="M31 45 H89 L83.5 93 a8 8 0 0 1 -8 7 H43.5 a8 8 0 0 1 -8 -7 Z M47.5 74 H51.5 A2.5 2.5 0 0 1 54 76.5 V85.5 A2.5 2.5 0 0 1 51.5 88 H47.5 A2.5 2.5 0 0 1 45 85.5 V76.5 A2.5 2.5 0 0 1 47.5 74 Z M58.5 66 H62.5 A2.5 2.5 0 0 1 65 68.5 V85.5 A2.5 2.5 0 0 1 62.5 88 H58.5 A2.5 2.5 0 0 1 56 85.5 V68.5 A2.5 2.5 0 0 1 58.5 66 Z M69.5 58 H73.5 A2.5 2.5 0 0 1 76 60.5 V85.5 A2.5 2.5 0 0 1 73.5 88 H69.5 A2.5 2.5 0 0 1 67 85.5 V60.5 A2.5 2.5 0 0 1 69.5 58 Z" fill="#1c4a35" fill-rule="evenodd"></path>
      </g>
      <text x="186" y="123" font-family="'Plus Jakarta Sans',sans-serif" font-weight="800" font-size="96" letter-spacing="-3" fill="#1c4a35">Easy<tspan fill="#c39a36">Gestão</tspan></text>
    </svg>
    <div class="marca" style="display:none">Minha Loja</div>
    <div class="sub">Sistema de Gestão</div>

    <label for="email">Email</label>
    <input type="email" id="email" autocomplete="email" placeholder="seu@email.com" autofocus required>

    <label for="senha">Senha</label>
    <input type="password" id="senha" autocomplete="current-password" placeholder="Sua senha" required>

    <button type="submit" id="btn">Entrar</button>
    <div class="erro" id="erro"></div>

    <div class="links">
      <a class="esqueci" href="esqueci-senha.html">Esqueci a senha →</a>
      <a href="registro.html" style="font-weight:600;color:#1a6f5e">Criar Conta →</a>
    </div>
  </form>

  <script>
    // Identidade da loja (nome, logo, cor) — vem da config pública, sem login.
    (async function aplicarMarca(){
      try {
        const r = await fetch('/api/loja-publica');
        const cfg = await r.json();
        const nome = (cfg.loja_nome || 'Minha Loja').trim();
        const cor = (cfg.marca_cor || '').trim();
        if (cor) {
          document.documentElement.style.setProperty('--marca', cor);
          // deriva um tom mais escuro pro gradiente/hover
          const h = cor.replace('#','');
          if (h.length === 6) {
            const n = parseInt(h,16);
            const esc = c => Math.max(0, Math.round(c*0.78));
            const r2=esc((n>>16)&255), g2=esc((n>>8)&255), b2=esc(n&255);
            document.documentElement.style.setProperty('--marca-escura', '#'+((1<<24)+(r2<<16)+(g2<<8)+b2).toString(16).slice(1));
          }
        }
        const img = document.querySelector('.logo'), marca = document.querySelector('.marca');
        marca.textContent = nome;
        document.title = 'Entrar • ' + nome;
        if (cfg.loja_logo) { img.src = cfg.loja_logo; img.alt = nome; img.style.display=''; marca.style.display='none'; }
        else { img.style.display='none'; marca.style.display='block'; }
      } catch(e) { document.querySelector('.marca').style.display='block'; }
    })();

    // destino conforme o papel de quem está logado
    function destinoPorPapel(papel){ return papel === 'relacionamento' ? 'relacionamento.html' : 'index.html'; }

    // se já estiver logado, vai direto pro destino do papel
    fetch('/api/me', { credentials: 'same-origin' }).then(async r => {
      if (r.ok) { const me = await r.json().catch(()=>({})); location.href = destinoPorPapel(me.papel); }
    });

    async function entrar(ev) {
      ev.preventDefault();
      const btn = document.getElementById('btn'), erro = document.getElementById('erro');
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (***REMOVED***email || ***REMOVED***senha) {
        erro.textContent = 'Email e senha são obrigatórios';
        return;
      }

      erro.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, senha })
        });

        const d = await resp.json().catch(() => ({}));

        if (resp.ok && d.ok) {
          // Login bem-sucedido
          location.href = d.destino || 'index.html';
        } else {
          erro.textContent = d.erro || 'Falha ao entrar';
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      } catch (e) {
        erro.textContent = 'Erro de conexão';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
