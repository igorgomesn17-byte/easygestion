<DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Vendas • DS Store</title>
  <link rel="stylesheet" href="css/ds.css">
  <style>
    .tabela-vendas { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .tabela-vendas thead { background: var(--surface-2); font-weight: 600; font-size: 0.9rem; }
    .tabela-vendas th, .tabela-vendas td { padding: 12px 8px; text-align: left; border-bottom: 1px solid var(--surface-2); }
    .tabela-vendas tbody tr { cursor: pointer; transition: background 0.2s; }
    .tabela-vendas tbody tr:hover { background: var(--surface-2); }
    .tabela-vendas .num { text-align: center; font-weight: 600; }
    .tabela-vendas .moeda { text-align: right; font-weight: 600; color: #27ae60; }
  </style>
</head>
<body>
  <div class="conteudo">
    <div class="flex-entre">
      <div><h1>Histórico de vendas</h1><p class="subtitulo">Todas as vendas realizadas</p></div>
    </div>

    <div class="card">
      <div class="linha" style="gap:8px; flex-wrap:wrap;">
        <input type="date" id="filtroDE" onchange="carregar()">
        <input type="date" id="filtroATE" onchange="carregar()">
        <input type="search" id="busca" placeholder="🔎 Buscar por cliente..." oninput="render()">
        <button class="btn" onclick="exportar()">⬇ Exportar CSV</button>
      </div>
    </div>

    <table class="tabela-vendas" id="tabela">
      <thead>
        <tr>
          <th style="width:12%;">DATA</th>
          <th style="width:20%;">CLIENTE</th>
          <th style="width:15%;">VENDEDOR</th>
          <th style="width:15%;">PAGAMENTO</th>
          <th style="width:12%;" class="moeda">TOTAL</th>
          <th style="width:12%;" class="moeda">LUCRO</th>
          <th style="width:4%;">›</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>

  <div class="modal-fundo" id="modalVenda">
    <div class="modal">
      <button class="modal-fechar" onclick="fecharModal()">&times;</button>
      <h2 id="vendaTitulo">Venda #123</h2>
      <div id="vendaDetalhes"></div>
    </div>
  </div>

  <script src="js/comum.js"></script>
  <script>
    montarLayout('historico');
    let dados = [];

    async function carregar() {
      const de = document.getElementById('filtroDE').value;
      const ate = document.getElementById('filtroATE').value;
      let url = '/vendas';
      if (de || ate) {
        url += '?';
        if (de) url += 'de=' + de;
        if (de && ate) url += '&';
        if (ate) url += 'ate=' + ate;
      }
      const resp = await api(url);
      dados = resp.vendas || [];
      render();
    }

    function render() {
      const b = document.getElementById('busca').value.toLowerCase();
      const arr = dados.filter(v => !b || (v.cliente_nome && v.cliente_nome.toLowerCase().includes(b)));
      const div = document.getElementById('lista');
      if (arr.length === 0) {
        div.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:32px;">Nenhuma venda encontrada.</td></tr>';
        return;
      }
      div.innerHTML = arr.map(v => `
        <tr onclick="verDetalhes(${v.id})">
          <td>${v.data_hora.slice(0,10).split('-').reverse().join('/')}<br><span class="texto-cinza" style="font-size:0.85rem;">${v.data_hora.slice(11,16)}</span></td>
          <td>${v.cliente_nome ? esc(v.cliente_nome) : '<em>não cadastrado</em>'}</td>
          <td>${v.vendedor_nome ? esc(v.vendedor_nome) : '—'}</td>
          <td>${rotuloPagamento(v.forma_pagamento)}</td>
          <td class="moeda">${moeda(v.total)}</td>
          <td class="moeda">${moeda(v.lucro)}</td>
          <td class="num">›</td>
        </tr>`).join('');
    }

    async function verDetalhes(id) {
      const v = await api('/vendas/' + id);
      document.getElementById('vendaTitulo').textContent = `Venda #${v.id}`;

      const itens = v.itens ? v.itens.map(i => `
        <div class="linha" style="padding:8px 0; border-bottom:1px solid #EEE;">
          <div>${i.qtd}x ${esc(i.descricao)}</div>
          <strong>${moeda(i.preco_unit)}</strong>
        </div>`).join('') : '';

      document.getElementById('vendaDetalhes').innerHTML = `
        <div style="padding:0;">
          <div style="padding:12px 0; border-bottom:1px solid #EEE; margin-bottom:12px;">
            <div style="font-size:0.9rem; color:#666;">
              ${v.data_hora.slice(0,10).split('-').reverse().join('/')} às ${v.data_hora.slice(11,16)}
            </div>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
            <div>
              <strong style="color:#666; font-size:0.85rem;">Cliente</strong>
              <div style="margin-top:4px;">${v.cliente_nome ? esc(v.cliente_nome) : '—'}</div>
            </div>
            <div>
              <strong style="color:#666; font-size:0.85rem;">Vendedor</strong>
              <div style="margin-top:4px;">${v.vendedor_nome ? esc(v.vendedor_nome) : '—'}</div>
            </div>
            <div>
              <strong style="color:#666; font-size:0.85rem;">Canal</strong>
              <div style="margin-top:4px;">Loja física</div>
            </div>
            <div>
              <strong style="color:#666; font-size:0.85rem;">Pagamento</strong>
              <div style="margin-top:4px;">${rotuloPagamento(v.forma_pagamento)}</div>
            </div>
          </div>

          <div style="border:1px solid #EEE; border-radius:6px; padding:12px; margin-bottom:16px;">
            <strong style="display:block; margin-bottom:8px;">Itens</strong>
            <table style="width:100%; font-size:0.9rem;">
              <thead style="background:#f5f5f5;">
                <tr>
                  <th style="text-align:left; padding:6px;">PEÇA</th>
                  <th style="text-align:center; padding:6px;">QTD</th>
                  <th style="text-align:right; padding:6px;">VALOR</th>
                </tr>
              </thead>
              <tbody>
                ${v.itens ? v.itens.map(i => `
                  <tr style="border-bottom:1px solid #EEE;">
                    <td style="padding:6px;">${esc(i.descricao)}</td>
                    <td style="text-align:center; padding:6px;">${i.qtd}</td>
                    <td style="text-align:right; padding:6px;">${moeda(i.preco_unit)}</td>
                  </tr>
                `).join('') : ''}
              </tbody>
            </table>
          </div>

          <div style="border:1px solid #EEE; border-radius:6px; padding:12px; margin-bottom:16px; font-size:0.9rem;">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
              <span>Subtotal:</span>
              <strong>${moeda(v.subtotal || v.total)}</strong>
            </div>
            ${v.taxa_aplicada > 0 ? `
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span>Taxa ${v.taxa_aplicada.toFixed(1)}%:</span>
                <strong style="color:#E74C3C;">-${moeda(v.valor_liquido ? (v.subtotal - v.valor_liquido) : 0)}</strong>
              </div>
            ` : ''}
            ${v.desconto > 0 ? `
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span>Desconto:</span>
                <strong style="color:#27ae60;">-${moeda(v.desconto)}</strong>
              </div>
            ` : ''}
            ${v.imposto > 0 ? `
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span>Imposto (${(v.imposto / v.total * 100).toFixed(2)}%):</span>
                <strong style="color:#E74C3C;">-${moeda(v.imposto)}</strong>
              </div>
            ` : ''}
            ${v.comissao_valor > 0 ? `
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span>Comissão:</span>
                <strong style="color:#E74C3C;">-${moeda(v.comissao_valor)}</strong>
              </div>
            ` : ''}
            ${v.custo_total > 0 ? `
              <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                <span>Custo das peças:</span>
                <strong style="color:#E74C3C;">-${moeda(v.custo_total)}</strong>
              </div>
            ` : ''}
            <div style="border-top:1px solid #EEE; padding-top:8px; display:flex; justify-content:space-between; font-weight:700; font-size:1.1rem;">
              <span>Lucro líquido:</span>
              <strong style="color:#27ae60;">${moeda(v.lucro)}</strong>
            </div>
          </div>

          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <button class="btn" style="background:#27ae60; color:white;" onclick="emitirNfce(${v.id})">📄 Emitir NFC-e</button>
            <button class="btn" style="background:#E74C3C; color:white;" onclick="abrirTroca(${v.id})">🔄 Registrar troca</button>
          </div>
        </div>
      `;
      document.getElementById('modalVenda').classList.add('aberto');
    }

    function fecharModal() {
      document.getElementById('modalVenda').classList.remove('aberto');
    }

    async function emitirNfce(vendaId) {
      try {
        const r = await api('/nfce/emitir/' + vendaId, { method:'POST', body:{} });
        toast('NFC-e emitida com sucesso','sucesso');
        fecharModal();
      } catch(e) { toast(e.message,'erro'); }
    }

    function abrirTroca(vendaId) {
      fecharModal();
      window.location.href = 'trocas.html?venda=' + vendaId;
    }

    function exportar() {
      if (!dados.length) { toast('Nada para exportar','erro'); return; }
      const linhas = dados.map(v => ({
        ID: v.id, Cliente: v.cliente_nome||'', Data: v.data_hora.slice(0,10),
        Hora: v.data_hora.slice(11,16), Pagamento: v.forma_pagamento,
        Subtotal: v.subtotal||v.total, Desconto: v.desconto||0, Total: v.total, Lucro: v.lucro
      }));
      exportarCSV('historico-vendas-' + hojeLocalStr(), linhas);
    }

    document.getElementById('modalVenda').addEventListener('click', e => { if(e.target.id==='modalVenda') fecharModal(); });
    carregar();
  </script>
</body>
</html>
