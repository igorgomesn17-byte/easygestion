<***REMOVED***DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EASYGESTION - Ativação</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a3a3a 0%, #0f2e2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo img {
      height: 50px;
      margin-bottom: 15px;
    }

    .logo h1 {
      font-size: 24px;
      color: #1a3a3a;
      margin-bottom: 5px;
    }

    .logo p {
      font-size: 13px;
      color: #666;
    }

    .status {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 25px;
      font-size: 13px;
      color: #856404;
    }

    .status.error {
      background: #f8d7da;
      border-color: #f5c6cb;
      color: #721c24;
    }

    .status.success {
      background: #d4edda;
      border-color: #c3e6cb;
      color: #155724;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #1a3a3a;
      box-shadow: 0 0 0 3px rgba(26, 58, 58, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1a3a3a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #0f2e2e;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .info {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 6px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .info strong {
      display: block;
      margin-bottom: 5px;
      color: #333;
    }

    .link-text {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
    }

    .link-text a {
      color: #1a3a3a;
      text-decoration: none;
      font-weight: 600;
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
      font-size: 12px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #1a3a3a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .dias-restantes {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/img/logo-ds.png" alt="DS Store">
      <h1>EASYGESTION</h1>
      <p>Sistema de Gestão</p>
    </div>

    <div id="status"></div>

    <div id="form-ativacao">
      <h2 style="font-size: 18px; margin-bottom: 20px; color: #1a3a3a;">Ative o Sistema</h2>

      <div class="form-group">
        <label for="codigo">Código de Ativação</label>
        <input
          type="text"
          id="codigo"
          placeholder="EG-XXXXXXXXXX-XXXX"
          autocomplete="off"
        >
        <div class="dias-restantes" id="daysInfo"></div>
      </div>

      <button onclick="ativar()">Ativar Licença</button>

      <div class="info">
        <strong>Como funciona:</strong>
        Insira o código de ativação recebido. A licença tem validade de 30 dias e será expirada automaticamente.
      </div>
    </div>

    <div id="form-acesso" style="display: none;">
      <h2 style="font-size: 18px; margin-bottom: 20px; color: #1a3a3a;">Acesso Permitido</h2>
      <div id="infoLicenca"></div>
      <button onclick="irParaLogin()" style="margin-top: 20px;">Ir para Login</button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span>Processando...</span>
    </div>
  </div>

  <script>
    // Verificar se já está ativado
    async function verificarLicenca() {
      try {
        const res = await fetch('/api/license/check');
        const data = await res.json();

        if (data.licensed) {
          mostrarAcessoPermitido(data);
        } else {
          mostrarForm();
          if (data.error) {
            mostrarErro(data.error);
          }
        }
      } catch (err) {
        mostrarErro('Erro ao verificar licença: ' + err.message);
      }
    }

    async function ativar() {
      const codigo = document.getElementById('codigo').value.trim();

      if (***REMOVED***codigo) {
        mostrarErro('Digite o código de ativação');
        return;
      }

      document.getElementById('loading').style.display = 'block';

      try {
        const res = await fetch('/api/license/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: codigo })
        });

        const data = await res.json();
        document.getElementById('loading').style.display = 'none';

        if (data.success) {
          mostrarSucesso(data.message);
          setTimeout(() => {
            mostrarAcessoPermitido(data);
          }, 1500);
        } else {
          mostrarErro(data.error || 'Erro ao ativar licença');
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        mostrarErro('Erro: ' + err.message);
      }
    }

    function mostrarErro(msg) {
      const status = document.getElementById('status');
      status.innerHTML = `<div class="status error">❌ ${msg}</div>`;
    }

    function mostrarSucesso(msg) {
      const status = document.getElementById('status');
      status.innerHTML = `<div class="status success">✅ ${msg}</div>`;
    }

    function mostrarForm() {
      document.getElementById('form-ativacao').style.display = 'block';
      document.getElementById('form-acesso').style.display = 'none';
      document.getElementById('status').innerHTML = '';
    }

    function mostrarAcessoPermitido(data) {
      document.getElementById('form-ativacao').style.display = 'none';
      document.getElementById('form-acesso').style.display = 'block';

      const info = document.getElementById('infoLicenca');
      info.innerHTML = `
        <div class="status success">
          ✅ Sistema ativado com sucesso***REMOVED***
        </div>
        <div style="margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 6px; font-size: 13px;">
          <strong style="display: block; color: #333; margin-bottom: 10px;">Informações da Licença:</strong>
          <div style="margin: 5px 0;">✓ Ativado até: <strong>${data.expiresAt}</strong></div>
          <div style="margin: 5px 0;">✓ Dias restantes: <strong>${data.daysLeft} dias</strong></div>
          <div style="margin: 5px 0; color: #666; font-size: 12px;">Depois que expirar, será necessário um novo código.</div>
        </div>
      `;
    }

    function irParaLogin() {
      window.location.href = '/login.html';
    }

    // Ao carregar, verificar licença
    document.addEventListener('DOMContentLoaded', verificarLicenca);
  </script>
</body>
</html>
